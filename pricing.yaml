# Token pricing, USD per MILLION tokens. Edit freely — this is the source of truth
# for $ cost. Re-verify against vendor pricing pages periodically; model lineups
# churn. Snapshot date: 2026-06-19.
#
# Rate fields (all per 1M tokens):
#   input            base (uncached) input
#   cache_write_5m   writing to the 5-minute prompt cache  (Anthropic: 1.25x input)
#   cache_write_1h   writing to the 1-hour prompt cache    (Anthropic: 2.0x input)
#   cache_read       reading from cache / cached input     (~0.1x input)
#   output           output tokens (includes reasoning tokens for OpenAI)
#
# Lookup is exact model match first, then longest-prefix match, then the
# provider `default`. Unknown models fall back to the provider default so cost
# is approximate rather than zero.

anthropic:
  default: { input: 5.00, cache_write_5m: 6.25, cache_write_1h: 10.00, cache_read: 0.50, output: 25.00 }
  models:
    claude-fable-5:    { input: 10.00, cache_write_5m: 12.50, cache_write_1h: 20.00, cache_read: 1.00, output: 50.00 }
    claude-mythos-5:   { input: 10.00, cache_write_5m: 12.50, cache_write_1h: 20.00, cache_read: 1.00, output: 50.00 }
    claude-opus-4-8:   { input: 5.00,  cache_write_5m: 6.25,  cache_write_1h: 10.00, cache_read: 0.50, output: 25.00 }
    claude-opus-4-7:   { input: 5.00,  cache_write_5m: 6.25,  cache_write_1h: 10.00, cache_read: 0.50, output: 25.00 }
    claude-opus-4-6:   { input: 5.00,  cache_write_5m: 6.25,  cache_write_1h: 10.00, cache_read: 0.50, output: 25.00 }
    claude-opus-4-5:   { input: 5.00,  cache_write_5m: 6.25,  cache_write_1h: 10.00, cache_read: 0.50, output: 25.00 }
    claude-sonnet-4-6: { input: 3.00,  cache_write_5m: 3.75,  cache_write_1h: 6.00,  cache_read: 0.30, output: 15.00 }
    claude-sonnet-4-5: { input: 3.00,  cache_write_5m: 3.75,  cache_write_1h: 6.00,  cache_read: 0.30, output: 15.00 }
    claude-haiku-4-5:  { input: 1.00,  cache_write_5m: 1.25,  cache_write_1h: 2.00,  cache_read: 0.10, output: 5.00 }

# OpenAI / Codex. No separate cache-write tier; cache_read = cached-input rate.
openai:
  default: { input: 1.75, cache_write_5m: 0.0, cache_write_1h: 0.0, cache_read: 0.175, output: 14.00 }
  models:
    gpt-5.3-codex: { input: 1.75, cache_read: 0.175, output: 14.00 }
    gpt-5.5:       { input: 5.00, cache_read: 0.50,  output: 30.00 }
    gpt-5.5-pro:   { input: 30.00, cache_read: 0.0,  output: 180.00 }
    gpt-5.4:       { input: 2.50, cache_read: 0.25,  output: 15.00 }
    gpt-5.4-mini:  { input: 0.75, cache_read: 0.075, output: 4.50 }
    gpt-5.4-nano:  { input: 0.20, cache_read: 0.02,  output: 1.25 }
    o3:            { input: 2.00, cache_read: 0.50,  output: 8.00 }
    o4-mini:       { input: 1.10, cache_read: 0.55,  output: 4.40 }
    gpt-4.1:       { input: 2.00, cache_read: 0.50,  output: 8.00 }
    gpt-4.1-mini:  { input: 0.40, cache_read: 0.10,  output: 1.60 }
    gpt-4o:        { input: 2.50, cache_read: 1.25,  output: 10.00 }
    gpt-4o-mini:   { input: 0.15, cache_read: 0.075, output: 0.60 }

# Local models (Ollama via Claude Code routing) — zero $; tokens still tracked.
local:
  default: { input: 0.0, cache_write_5m: 0.0, cache_write_1h: 0.0, cache_read: 0.0, output: 0.0 }
  models: {}
